<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuroWeb</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/vis-network/styles/vis-network.min.css"
    />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <h1>NeuroWeb</h1>
        <p class="subtitle">A visual second brain for connected ideas.</p>
      </header>

      <main class="layout">
        <section class="panel controls">
          <h2>Add Thought</h2>
          <form id="thoughtForm" class="stack">
            <label>
              Title
              <input id="titleInput" type="text" maxlength="80" required />
            </label>
            <label>
              Description
              <textarea id="contentInput" rows="3" maxlength="240" required></textarea>
            </label>
            <label>
              Tag (optional)
              <input id="tagInput" type="text" maxlength="24" />
            </label>
            <button type="submit">Add Thought</button>
          </form>

          <h2>Connect Thoughts</h2>
          <form id="connectionForm" class="stack">
            <label>
              From
              <select id="fromSelect" required></select>
            </label>
            <label>
              To
              <select id="toSelect" required></select>
            </label>
            <button type="submit">Create Connection</button>
          </form>

          <button id="randomThoughtBtn" class="secondary">Show Random Connected Thought</button>
          <p id="statusMessage" class="status" aria-live="polite"></p>
        </section>

        <section class="panel graph-panel">
          <div id="network"></div>
        </section>

        <aside class="panel details" id="detailsPanel">
          <h2>Thought Details</h2>
          <div id="detailsContent">
            <p>Select a node to explore its thought.</p>
          </div>
        </aside>
      </main>
    </div>

    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
